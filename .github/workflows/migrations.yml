name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'src/**/Migrations/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  apply-migrations:
    name: Apply Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Generate migration script
        run: |
          dotnet ef migrations script \
            --idempotent \
            --project src/Services/JobRecon.Identity/JobRecon.Identity.csproj \
            --output migrations-identity.sql

      - name: Upload migration scripts
        uses: actions/upload-artifact@v4
        with:
          name: migration-scripts
          path: '*.sql'

      # Migrations are applied manually or via separate deployment process
      # This workflow generates the scripts for review
      - name: Migration script generated
        run: |
          echo "Migration scripts have been generated and uploaded as artifacts."
          echo "Review and apply them manually or through your deployment pipeline."
