{{- if .Values.identity.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobrecon.fullname" . }}-identity
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "identity") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.identity.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.identity.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "identity") | nindent 4 }}
{{- end }}
