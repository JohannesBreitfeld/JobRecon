{{- if .Values.matching.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobrecon.fullname" . }}-matching
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "matching") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.matching.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "matching") | nindent 4 }}
{{- end }}
