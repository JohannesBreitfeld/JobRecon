{{- if .Values.profile.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobrecon.fullname" . }}-profile
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.profile.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 4 }}
{{- end }}
