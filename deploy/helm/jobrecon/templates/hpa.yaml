{{- $services := dict "gateway" .Values.gateway "identity" .Values.identity "profile" .Values.profile "jobs" .Values.jobs }}
{{- range $name, $svc := $services }}
{{- if and $svc.enabled (hasKey $svc "autoscaling") $svc.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "jobrecon.fullname" $ }}-{{ $name }}
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" $.Chart "Release" $.Release "component" $name) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "jobrecon.fullname" $ }}-{{ $name }}
  minReplicas: {{ $svc.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
