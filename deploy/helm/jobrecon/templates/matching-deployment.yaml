{{- if .Values.matching.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobrecon.fullname" . }}-matching
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "matching") | nindent 4 }}
spec:
  replicas: {{ .Values.matching.replicaCount }}
  selector:
    matchLabels:
      {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "matching") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "matching") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: matching
          image: {{ include "jobrecon.image" (dict "global" .Values.global "service" .Values.matching) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Kestrel__Endpoints__Http__Url
              value: http://+:8080
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: jwt-signing-key
            - name: Redis__ConnectionString
              value: "{{ .Values.infrastructure.redis.host }}:{{ .Values.infrastructure.redis.port }}"
            - name: GrpcServices__ProfileService
              value: "http://{{ include "jobrecon.fullname" . }}-profile:5012"
            - name: GrpcServices__JobsService
              value: "http://{{ include "jobrecon.fullname" . }}-jobs:5013"
            - name: RabbitMQ__Host
              value: {{ .Values.infrastructure.rabbitmq.host | quote }}
            - name: RabbitMQ__Port
              value: {{ .Values.infrastructure.rabbitmq.port | quote }}
            - name: RabbitMQ__Username
              value: "jobrecon"
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: Ollama__BaseUrl
              value: "http://{{ .Values.infrastructure.ollama.host }}:{{ .Values.infrastructure.ollama.port }}"
            - name: Qdrant__Host
              value: {{ .Values.infrastructure.qdrant.host | quote }}
            - name: Qdrant__GrpcPort
              value: {{ .Values.infrastructure.qdrant.ports.grpc | quote }}
            - name: GrpcApiKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: grpc-api-key
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.matching.resources | nindent 12 }}
{{- end }}
