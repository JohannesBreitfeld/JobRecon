{{- if .Values.jobs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobrecon.fullname" . }}-jobs
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "jobs") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.jobs.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.jobs.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "jobs") | nindent 4 }}
{{- end }}
