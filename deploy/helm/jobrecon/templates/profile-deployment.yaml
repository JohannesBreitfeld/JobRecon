{{- if .Values.profile.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobrecon.fullname" . }}-profile
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 4 }}
spec:
  replicas: {{ .Values.profile.replicaCount }}
  selector:
    matchLabels:
      {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 8 }}
    spec:
      containers:
        - name: profile
          image: {{ include "jobrecon.image" (dict "global" .Values.global "service" .Values.profile) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: postgres-connection-string
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: rabbitmq-password
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.profile.resources | nindent 12 }}
{{- end }}
