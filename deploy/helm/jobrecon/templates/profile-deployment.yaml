{{- if .Values.profile.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobrecon.fullname" . }}-profile
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 4 }}
spec:
  replicas: {{ .Values.profile.replicaCount }}
  selector:
    matchLabels:
      {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "profile") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: profile
          image: {{ include "jobrecon.image" (dict "global" .Values.global "service" .Values.profile) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 5012
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Kestrel__Endpoints__Http__Url
              value: http://+:8080
            - name: Kestrel__Endpoints__Http__Protocols
              value: Http1AndHttp2
            - name: Kestrel__Endpoints__Grpc__Url
              value: http://+:5012
            - name: Kestrel__Endpoints__Grpc__Protocols
              value: Http2
            - name: ConnectionStrings__ProfileDb
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: postgres-connection-string
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: jwt-signing-key
            - name: Redis__ConnectionString
              value: "{{ .Values.infrastructure.redis.host }}:{{ .Values.infrastructure.redis.port }}"
            - name: RabbitMQ__Host
              value: {{ .Values.infrastructure.rabbitmq.host | quote }}
            - name: RabbitMQ__Port
              value: {{ .Values.infrastructure.rabbitmq.port | quote }}
            - name: RabbitMQ__Username
              value: "jobrecon"
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: Minio__Endpoint
              value: "{{ .Values.infrastructure.minio.host }}:{{ .Values.infrastructure.minio.port }}"
            - name: Minio__UseSSL
              value: "false"
            - name: Minio__AccessKey
              valueFrom:
                secretKeyRef:
                  name: jobrecon-infra-secrets
                  key: rootUser
            - name: Minio__SecretKey
              valueFrom:
                secretKeyRef:
                  name: jobrecon-infra-secrets
                  key: rootPassword
            - name: GrpcApiKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobrecon.fullname" . }}-secrets
                  key: grpc-api-key
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.profile.resources | nindent 12 }}
{{- end }}
