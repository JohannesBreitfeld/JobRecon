{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobrecon.fullname" . }}-gateway
  labels:
    {{- include "jobrecon.serviceLabels" (dict "Chart" .Chart "Release" .Release "component" "gateway") | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "jobrecon.serviceSelectorLabels" (dict "Chart" .Chart "Release" .Release "component" "gateway") | nindent 4 }}
{{- end }}
