# Default values for jobrecon
# This is a YAML-formatted file.

global:
  image:
    registry: ghcr.io
    owner: johannesbreitfeld
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []

# Identity Service
identity:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-identity
  service:
    port: 80
    grpcPort: 5011
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Profile Service
profile:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-profile
  service:
    port: 80
    grpcPort: 5012
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Jobs Service — split into web (HTTP/gRPC) and worker (Hangfire server) deployments.
# autoscaling applies to the web deployment only; the worker is a singleton sized for
# enrichment throughput (adjust replicaCount manually).
jobs:
  enabled: true
  image:
    repository: jobrecon-jobs
  service:
    port: 80
    grpcPort: 5013
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  web:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  worker:
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 1536Mi

# Matching Service
matching:
  enabled: true
  replicaCount: 1
  image:
    repository: jobrecon-matching
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Notifications Service
notifications:
  enabled: true
  replicaCount: 1
  image:
    repository: jobrecon-notifications
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# API Gateway
gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-gateway
  service:
    type: ClusterIP
    port: 80
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: api.jobrecon.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Frontend
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-frontend
  service:
    port: 80
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: jobrecon.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Network Policies - default deny + explicit allow rules
networkPolicy:
  enabled: false

# Secrets - Values should be provided via --set or external secret management
secrets:
  # Set to false when using external secrets (e.g., SOPS with Flux CD)
  create: true
  # These should be provided at deploy time, NEVER commit actual values
  postgresPassword: ""
  jwtSigningKey: ""
  rabbitMqPassword: ""

# Infrastructure service endpoints
infrastructure:
  postgresql:
    host: postgres
    port: 5432
  mongodb:
    host: mongodb
    port: 27017
  redis:
    host: redis-master
    port: 6379
  rabbitmq:
    host: rabbitmq
    port: 5672
  qdrant:
    host: qdrant
    ports:
      http: 6333
      grpc: 6334
  minio:
    host: minio
    port: 9000
  ollama:
    host: ollama
    port: 11434
