# Default values for jobrecon
# This is a YAML-formatted file.

global:
  image:
    registry: ghcr.io
    tag: latest
    pullPolicy: IfNotPresent

# Identity Service
identity:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-identity
  service:
    port: 80
    grpcPort: 5011
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Profile Service
profile:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-profile
  service:
    port: 80
    grpcPort: 5012
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Jobs Service
jobs:
  enabled: true
  replicaCount: 1
  image:
    repository: jobrecon-jobs
  service:
    port: 80
    grpcPort: 5013
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Matching Service
matching:
  enabled: true
  replicaCount: 1
  image:
    repository: jobrecon-matching
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Notifications Service
notifications:
  enabled: true
  replicaCount: 1
  image:
    repository: jobrecon-notifications
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# API Gateway
gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-gateway
  service:
    type: ClusterIP
    port: 80
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: api.jobrecon.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Frontend
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: jobrecon-frontend
  service:
    port: 80
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: jobrecon.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Network Policies - default deny + explicit allow rules
networkPolicy:
  enabled: false

# Secrets - Values should be provided via --set or external secret management
secrets:
  # These should be provided at deploy time, NEVER commit actual values
  postgresPassword: ""
  jwtSigningKey: ""
  rabbitMqPassword: ""
