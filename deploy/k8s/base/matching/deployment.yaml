apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching
  labels:
    app.kubernetes.io/name: matching
    app.kubernetes.io/component: matching
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: matching
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matching
        app.kubernetes.io/component: matching
    spec:
      containers:
        - name: matching
          image: ghcr.io/jobrecon-matching:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: GrpcServices__ProfileService
              value: http://profile:5012
            - name: GrpcServices__JobsService
              value: http://jobs:5013
            - name: Ollama__BaseUrl
              value: http://ollama:11434
            - name: Qdrant__Host
              value: qdrant
            - name: Qdrant__GrpcPort
              value: "6334"
          envFrom:
            - secretRef:
                name: matching-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
