apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  labels:
    app.kubernetes.io/name: notifications
    app.kubernetes.io/component: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notifications
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifications
        app.kubernetes.io/component: notifications
    spec:
      containers:
        - name: notifications
          image: ghcr.io/jobrecon-notifications:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: GrpcServices__IdentityService
              value: http://identity:5011
          envFrom:
            - secretRef:
                name: notifications-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
