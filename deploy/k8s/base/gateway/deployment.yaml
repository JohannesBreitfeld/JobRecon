apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/jobrecon-gateway:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ReverseProxy__Clusters__identity__Destinations__default__Address
              value: http://identity:80
            - name: ReverseProxy__Clusters__profile__Destinations__default__Address
              value: http://profile:80
            - name: ReverseProxy__Clusters__jobs__Destinations__default__Address
              value: http://jobs:80
            - name: ReverseProxy__Clusters__matching__Destinations__default__Address
              value: http://matching:80
            - name: ReverseProxy__Clusters__notifications__Destinations__default__Address
              value: http://notifications:80
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
