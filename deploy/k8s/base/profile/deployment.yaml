apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile
  labels:
    app.kubernetes.io/name: profile
    app.kubernetes.io/component: profile
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: profile
  template:
    metadata:
      labels:
        app.kubernetes.io/name: profile
        app.kubernetes.io/component: profile
    spec:
      containers:
        - name: profile
          image: ghcr.io/jobrecon-profile:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          envFrom:
            - secretRef:
                name: profile-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
