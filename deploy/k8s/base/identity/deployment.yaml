apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
        app.kubernetes.io/component: identity
    spec:
      containers:
        - name: identity
          image: ghcr.io/jobrecon-identity:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 5011
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Kestrel__Endpoints__Http__Url
              value: http://0.0.0.0:8080
            - name: Kestrel__Endpoints__Http__Protocols
              value: Http1AndHttp2
            - name: Kestrel__Endpoints__Grpc__Url
              value: http://0.0.0.0:5011
            - name: Kestrel__Endpoints__Grpc__Protocols
              value: Http2
          envFrom:
            - secretRef:
                name: identity-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
