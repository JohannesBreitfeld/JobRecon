# ArgoCD Application for JobRecon
# This file is used by ArgoCD to deploy the application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jobrecon
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JohannesBreitfeld/jobrecon.git
    targetRevision: HEAD
    path: deploy/k8s/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: jobrecon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
