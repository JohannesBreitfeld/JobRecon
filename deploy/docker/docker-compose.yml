services:
  # ===================
  # Infrastructure
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: jobrecon-postgres
    environment:
      POSTGRES_USER: jobrecon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: jobrecon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobrecon"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: jobrecon-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobrecon
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-devpassword}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobrecon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: jobrecon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: jobrecon
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-devpassword}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jobrecon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: jobrecon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jobrecon
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-devpassword123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # AI
  # ===================
  ollama:
    image: ollama/ollama:latest
    container_name: jobrecon-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment for GPU support (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: curlimages/curl:latest
    container_name: jobrecon-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    volumes:
      - ../../scripts/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["sh", "/ollama-init.sh"]

  # ===================
  # Application Services
  # ===================
  identity:
    build:
      context: ../..
      dockerfile: src/Services/JobRecon.Identity/Dockerfile
    container_name: jobrecon-identity
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5001;http://+:5011"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=jobrecon;Username=jobrecon;Password=${POSTGRES_PASSWORD:-devpassword};Search Path=identity"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      Redis__ConnectionString: "redis:6379"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:5001"
      Kestrel__Endpoints__Http__Protocols: "Http1AndHttp2"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:5011"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  profile:
    build:
      context: ../..
      dockerfile: src/Services/JobRecon.Profile/Dockerfile
    container_name: jobrecon-profile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ProfileDb: "Host=postgres;Database=jobrecon;Username=jobrecon;Password=${POSTGRES_PASSWORD:-devpassword};Search Path=profile"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "jobrecon"
      MinIO__SecretKey: "${MINIO_PASSWORD:-devpassword123}"
      GrpcApiKey: "${GRPC_API_KEY:-dev-grpc-api-key}"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:5002"
      Kestrel__Endpoints__Http__Protocols: "Http1AndHttp2"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:5012"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  jobs:
    build:
      context: ../..
      dockerfile: src/Services/JobRecon.Jobs/Dockerfile
    container_name: jobrecon-jobs
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__JobsDb: "Host=postgres;Database=jobrecon;Username=jobrecon;Password=${POSTGRES_PASSWORD:-devpassword};Search Path=jobs"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      Redis__ConnectionString: "redis:6379"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:5003"
      Kestrel__Endpoints__Http__Protocols: "Http1AndHttp2"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:5013"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
      GrpcApiKey: "${GRPC_API_KEY:-dev-grpc-api-key}"
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  matching:
    build:
      context: ../..
      dockerfile: src/Services/JobRecon.Matching/Dockerfile
    container_name: jobrecon-matching
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      GrpcServices__ProfileService: "http://profile:5012"
      GrpcServices__JobsService: "http://jobs:5013"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: jobrecon
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-devpassword}"
      Ollama__BaseUrl: "http://ollama:11434"
      Qdrant__Host: qdrant
      Qdrant__GrpcPort: "6334"
      Redis__ConnectionString: "redis:6379"
      GrpcApiKey: "${GRPC_API_KEY:-dev-grpc-api-key}"
    ports:
      - "5005:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      jobs:
        condition: service_started
      profile:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully

  notifications:
    build:
      context: ../..
      dockerfile: src/Services/JobRecon.Notifications/Dockerfile
    container_name: jobrecon-notifications
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationsDb: "Host=postgres;Database=jobrecon;Username=jobrecon;Password=${POSTGRES_PASSWORD:-devpassword};Search Path=notifications"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      GrpcServices__IdentityService: "http://identity:5011"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: jobrecon
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-devpassword}"
      Email__SmtpHost: mailhog
      Email__SmtpPort: "1025"
      Redis__ConnectionString: "redis:6379"
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ../..
      dockerfile: src/Gateway/JobRecon.Gateway/Dockerfile
    container_name: jobrecon-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!}"
      Jwt__Issuer: "JobRecon"
      Jwt__Audience: "JobRecon"
      Redis__ConnectionString: "redis:6379"
      ReverseProxy__Clusters__identity__Destinations__destination1__Address: "http://identity:5001"
      ReverseProxy__Clusters__profile__Destinations__destination1__Address: "http://profile:5002"
      ReverseProxy__Clusters__jobs__Destinations__destination1__Address: "http://jobs:5003"
      ReverseProxy__Clusters__matching__Destinations__destination1__Address: "http://matching:8080"
      ReverseProxy__Clusters__notifications__Destinations__destination1__Address: "http://notifications:8080"
    ports:
      - "5000:8080"
    depends_on:
      redis:
        condition: service_healthy
      identity:
        condition: service_started
      profile:
        condition: service_started
      jobs:
        condition: service_started
      matching:
        condition: service_started
      notifications:
        condition: service_started

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: jobrecon-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
  minio_data:
  ollama_data:
