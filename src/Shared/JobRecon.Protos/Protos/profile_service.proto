syntax = "proto3";

option csharp_namespace = "JobRecon.Protos.Profile";

package jobrecon.profile;

service ProfileGrpc {
  rpc GetProfile (GetProfileRequest) returns (ProfileResponse);
}

message GetProfileRequest {
  string user_id = 1;
}

message ProfileResponse {
  string user_id = 1;
  optional string current_job_title = 2;
  optional string summary = 3;
  optional string location = 4;
  optional int32 years_of_experience = 5;
  repeated SkillMessage skills = 6;
  repeated DesiredJobTitleMessage desired_job_titles = 7;
  optional JobPreferenceMessage preferences = 8;
}

message SkillMessage {
  string name = 1;
  string level = 2;
  optional int32 years_of_experience = 3;
}

message DesiredJobTitleMessage {
  string title = 1;
  int32 priority = 2;
}

message JobPreferenceMessage {
  optional double min_salary = 1;
  optional double max_salary = 2;
  repeated PreferredLocationMessage preferred_locations = 3;
  bool is_remote_preferred = 4;
  bool is_hybrid_accepted = 5;
  bool is_on_site_accepted = 6;
  optional string preferred_employment_types = 7;
  optional string preferred_industries = 8;
  optional string excluded_companies = 9;
  bool is_actively_looking = 10;
}

message PreferredLocationMessage {
  int32 locality_id = 1;
  string name = 2;
  double latitude = 3;
  double longitude = 4;
  optional int32 max_distance_km = 5;
}

